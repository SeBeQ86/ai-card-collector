name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    name: AI Code Review (Claude)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install review agent dependencies
        run: npm install
        working-directory: review

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} 2>/dev/null \
            || git diff origin/${{ github.base_ref }}...HEAD)
          # Truncate to ~14000 chars to stay within token limits
          PR_DIFF_TRUNCATED="${PR_DIFF:0:14000}"
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_DIFF_TRUNCATED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI code review agent
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "${{ steps.diff.outputs.diff }}" | npx tsx review.ts --json > /tmp/review.json 2>/tmp/review.stderr || true
          cat /tmp/review.stderr >&2 || true

          # Parse JSON verdict and summary
          VERDICT=$(jq -r '.verdict // "unknown"' /tmp/review.json 2>/dev/null || echo "unknown")
          SUMMARY=$(jq -r '.summary // "Review unavailable."' /tmp/review.json 2>/dev/null || echo "Review unavailable.")
          IMPL=$(jq -r '.implementationCorrectness // "?"' /tmp/review.json 2>/dev/null || echo "?")
          IDIO=$(jq -r '.idiomaticity // "?"' /tmp/review.json 2>/dev/null || echo "?")
          COMP=$(jq -r '.complexity // "?"' /tmp/review.json 2>/dev/null || echo "?")
          TEST=$(jq -r '.testRiskCoverage // "?"' /tmp/review.json 2>/dev/null || echo "?")
          SEC=$(jq -r '.securitySafety // "?"' /tmp/review.json 2>/dev/null || echo "?")

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "scores=Poprawność: $IMPL/10 | Idiomatyczność: $IDIO/10 | Złożoność: $COMP/10 | Testy: $TEST/10 | Bezpieczeństwo: $SEC/10" >> $GITHUB_OUTPUT
        working-directory: review

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERDICT="${{ steps.review.outputs.verdict }}"
          if [ "$VERDICT" = "pass" ]; then
            BADGE="✅ **PASS**"
          else
            BADGE="❌ **FAIL**"
          fi

          COMMENT="## 🤖 AI Code Review — $BADGE

          ${{ steps.review.outputs.scores }}

          ${{ steps.review.outputs.summary }}

          ---
          *Powered by Claude Haiku · [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT"
