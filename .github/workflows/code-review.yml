name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    name: AI Code Review (Claude)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install review agent dependencies
        run: npm install
        working-directory: review

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr_diff.txt 2>/dev/null \
            || git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          truncate -s 28000 /tmp/pr_diff.txt 2>/dev/null || true

      - name: Run AI code review agent
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat /tmp/pr_diff.txt | npx tsx review.ts --json > /tmp/review.json 2>/tmp/review.stderr || true
          cat /tmp/review.stderr >&2 || true

          VERDICT=$(jq -r '.verdict // "unknown"' /tmp/review.json 2>/dev/null || echo "unknown")
          SUMMARY=$(jq -r '.summary // "Review unavailable."' /tmp/review.json 2>/dev/null || echo "Review unavailable.")
          IMPL=$(jq -r '.implementationCorrectness // "?"' /tmp/review.json 2>/dev/null || echo "?")
          IDIO=$(jq -r '.idiomaticity // "?"' /tmp/review.json 2>/dev/null || echo "?")
          COMP=$(jq -r '.complexity // "?"' /tmp/review.json 2>/dev/null || echo "?")
          TEST=$(jq -r '.testRiskCoverage // "?"' /tmp/review.json 2>/dev/null || echo "?")
          SEC=$(jq -r '.securitySafety // "?"' /tmp/review.json 2>/dev/null || echo "?")

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "summary<<SUMMARY_EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "SUMMARY_EOF" >> $GITHUB_OUTPUT
          echo "scores=Impl:$IMPL Idio:$IDIO Complexity:$COMP Tests:$TEST Security:$SEC" >> $GITHUB_OUTPUT
        working-directory: review

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERDICT: ${{ steps.review.outputs.verdict }}
          SCORES: ${{ steps.review.outputs.scores }}
          SUMMARY: ${{ steps.review.outputs.summary }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$VERDICT" = "pass" ]; then BADGE="PASS"; else BADGE="FAIL"; fi
          printf '## AI Code Review - %s\n\n%s\n\n%s\n\n---\n*Claude Haiku - %s*\n' \
            "$BADGE" "$SCORES" "$SUMMARY" "$WORKFLOW_URL" > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/comment.md
